apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: drycc-listenerset
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: drycc-gateway
  listeners:
  {{- range $index, $app := .Values.apps }}
  {{- if eq $app.protocol "HTTP" }}
  - name: {{ printf "http-80-%s" $app.name | lower }}
    port: 80
    protocol: HTTP
    {{- if $app.hostname }}
    hostname: {{ tpl $app.hostname $ }}
    {{- end }}
  {{- if $.Values.global.certManagerEnabled }}
  - name: {{ printf "https-443-%s" $app.name | lower }}
    port: 443
    protocol: HTTPS
    {{- if $app.hostname }}
    hostname: {{ tpl $app.hostname $ }}
    {{- end }}
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: drycc-auto-tls
  {{- end }}
  {{- end }}
  {{- end }}
