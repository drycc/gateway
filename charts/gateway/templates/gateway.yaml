apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: drycc-gateway
  {{- if .Values.global.certManagerEnabled }}
  annotations:
    cert-manager.io/issuer: drycc-issuer
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayClass }}
  allowedListeners:
    namespaces:
      from: All
  listeners:
  {{- range $app := .Values.apps }}
  {{- if not (eq $app.protocol "HTTP") }}
  - name: {{ printf "%s-%v" $app.protocol $app.port | lower }}
    port: {{ $app.port }}
    protocol: {{ $app.protocol }}
    allowedRoutes:
      namespaces:
        from: All
  {{- end }}
  {{- end }}
  - name: http-80
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  {{- if .Values.global.certManagerEnabled }}
  - name: https-443
    port: 443
    protocol: HTTPS
    allowedRoutes:
      namespaces:
        from: All
  {{- end }}
